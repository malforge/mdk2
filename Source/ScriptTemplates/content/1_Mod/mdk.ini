; This file is project specific and should be checked in to source control.

[mdk]
; This is a mod project.
; You should not change this.
type=mod

; Toggle trace (on|off) (verbose output)
trace=off

; A list of files and folder to ignore when creating the script.
; This is a comma separated list of glob patterns. 
; See https://code.visualstudio.com/docs/editor/glob-patterns
ignores=obj/**/*,MDK/**/*,**/*.debug.cs

; A list of files and folders to not clean from the output folder when
; cleaning the project.
; This is a comma separated list of glob patterns.
; See https://code.visualstudio.com/docs/editor/glob-patterns
donotclean=metadata.mod,modinfo.sbmi

; Optional: deploy to a different output folder depending on the current git branch.
; Add one [mdk-branch:<branchname>] section per branch you want redirected. On that branch,
; the mod is packed into a folder named by 'pattern' instead of the project name, letting you
; publish a separate (e.g. alpha/test) Workshop item without touching your released mod. Branches
; with no matching section build to the project name as normal.
; 'pattern' supports macros: $MDK_PROJECT$ (project name), $MDK_BRANCH$ (current branch), plus
; the usual $MDK_DATE$ etc. The deployed thumbnail is watermarked by default on a branch section
; (set watermark=false to disable; watermarktext to customize the stamp).
; [mdk-branch:alpha]
; pattern=$MDK_PROJECT$.Alpha